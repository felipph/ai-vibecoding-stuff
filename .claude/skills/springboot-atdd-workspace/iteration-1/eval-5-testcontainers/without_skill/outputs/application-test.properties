# ============================================================
# Test Configuration for Testcontainers
# ============================================================

# Logging
logging.level.org.testcontainers=INFO
logging.level.org.springframework.boot.testcontainers=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JPA/Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DataSource (configured automatically by @ServiceConnection)
# These properties are overridden by Testcontainers
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///testdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# Testcontainers
testcontainers.reuse.enable=true
spring.testcontainers.beans.enabled=true
